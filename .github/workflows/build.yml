name: Build APK

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2

      - name: Build Release APK
        run: gradle assembleRelease

      - name: Build Debug APK
        run: gradle assembleDebug

      - name: Upload Release APK to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: DBTOOL-release
          path: app/build/outputs/apk/release/*.apk

      - name: Upload Debug APK to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: DBTOOL-debug
          path: app/build/outputs/apk/debug/*.apk

      # 自动创建Release（当push到main/master时）
      - name: Create Release on Push
        if: github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.run_number }}
          name: Build ${{ github.run_number }}
          files: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/apk/debug/*.apk
          draft: false
          prerelease: true
          body: |
            自动构建版本 - Build ${{ github.run_number }}
            
            **构建信息**:
            - 提交: ${{ github.sha }}
            - 分支: ${{ github.ref_name }}
            - 时间: ${{ github.event.head_commit.timestamp }}
            
            **包含文件**:
            - app-release.apk (Release版本)
            - app-debug.apk (Debug版本)
            
            **安装方法**:
            ```bash
            adb install app-release.apk
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 创建正式Release（当创建版本标签时）
      - name: Create Release on Tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/apk/debug/*.apk
          draft: false
          prerelease: false
          body: |
            # DBTOOL ${{ github.ref_name }}
            
            ## 📦 发布信息
            - **版本**: ${{ github.ref_name }}
            - **发布时间**: ${{ github.event.head_commit.timestamp }}
            - **提交**: ${{ github.sha }}
            
            ## 📥 下载
            - `app-release.apk` - Release版本（推荐）
            - `app-debug.apk` - Debug版本
            
            ## 🚀 安装
            ```bash
            adb install app-release.apk
            ```
            
            ## 📝 更新日志
            查看 [CHANGELOG.md](https://github.com/xbrooke/DBTOOL/blob/main/CHANGELOG.md) 了解详细更新内容
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
