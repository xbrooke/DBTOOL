name: Build APK

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2

      # 提取版本号和日期
      - name: Extract Version
        id: version
        run: |
          VERSION=$(grep "versionName" app/build.gradle | head -1 | grep -oP '"\K[^"]+')
          BUILD_DATE=$(date +%Y%m%d)
          BUILD_TIME=$(date +%H%M%S)
          TAG_NAME="v${VERSION}-${BUILD_DATE}-${BUILD_TIME}"
          APK_NAME="${VERSION}-${BUILD_DATE}-${BUILD_TIME}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "build_date=${BUILD_DATE}" >> $GITHUB_OUTPUT
          echo "build_time=${BUILD_TIME}" >> $GITHUB_OUTPUT
          echo "tag_name=${TAG_NAME}" >> $GITHUB_OUTPUT
          echo "apk_name=${APK_NAME}" >> $GITHUB_OUTPUT
          echo "Version: ${VERSION}, Build Date: ${BUILD_DATE}, Build Time: ${BUILD_TIME}, Tag: ${TAG_NAME}, APK Name: ${APK_NAME}"

      - name: Build Release APK
        run: gradle assembleRelease

      - name: Build Debug APK
        run: gradle assembleDebug

      # 重命名Release APK
      - name: Rename Release APK
        run: |
          mkdir -p renamed_apks
          for apk in app/build/outputs/apk/release/*.apk; do
            if [ -f "$apk" ]; then
              cp "$apk" "renamed_apks/${{ steps.version.outputs.apk_name }}-release.apk"
            fi
          done

      # 重命名Debug APK
      - name: Rename Debug APK
        run: |
          mkdir -p renamed_apks
          for apk in app/build/outputs/apk/debug/*.apk; do
            if [ -f "$apk" ]; then
              cp "$apk" "renamed_apks/${{ steps.version.outputs.apk_name }}-debug.apk"
            fi
          done

      - name: Upload Release APK to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: DBTOOL-release
          path: renamed_apks/*-release.apk

      - name: Upload Debug APK to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: DBTOOL-debug
          path: renamed_apks/*-debug.apk

      # 检查tag是否已存在
      - name: Check if tag exists
        id: check_tag
        run: |
          if git rev-parse "${{ steps.version.outputs.tag_name }}" >/dev/null 2>&1; then
            echo "tag_exists=true" >> $GITHUB_OUTPUT
          else
            echo "tag_exists=false" >> $GITHUB_OUTPUT
          fi

      # 创建新tag（每次push都创建）
      - name: Create Tag
        if: github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/')
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git tag -a "${{ steps.version.outputs.tag_name }}" -m "Automated release: ${{ steps.version.outputs.tag_name }}"
          git push origin "${{ steps.version.outputs.tag_name }}"

      # 自动创建Release（当push到main/master时）
      - name: Create Release on Push
        if: github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.tag_name }}
          name: DBTOOL ${{ steps.version.outputs.tag_name }}
          files: |
            renamed_apks/*-release.apk
            renamed_apks/*-debug.apk
          draft: false
          prerelease: false
          body: |
            # DBTOOL ${{ steps.version.outputs.tag_name }}
            
            ## 📦 发布信息
            - **版本**: ${{ steps.version.outputs.version }}
            - **构建日期**: ${{ steps.version.outputs.build_date }}
            - **构建时间**: ${{ steps.version.outputs.build_time }}
            - **提交**: ${{ github.sha }}
            - **分支**: ${{ github.ref_name }}
            
            ## 📥 下载
            - `${{ steps.version.outputs.apk_name }}-release.apk` - Release版本（推荐用于生产环境）
            - `${{ steps.version.outputs.apk_name }}-debug.apk` - Debug版本（用于开发测试）
            
            ## 🚀 安装方法
            ```bash
            adb install -r ${{ steps.version.outputs.apk_name }}-release.apk
            ```
            
            ## 📝 更新日志
            查看 [CHANGELOG.md](https://github.com/xbrooke/DBTOOL/blob/main/CHANGELOG.md) 了解详细更新内容
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 创建正式Release（当创建版本标签时）
      - name: Create Release on Tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            renamed_apks/*-release.apk
            renamed_apks/*-debug.apk
          draft: false
          prerelease: false
          body: |
            # DBTOOL ${{ github.ref_name }}
            
            ## 📦 发布信息
            - **版本**: ${{ github.ref_name }}
            - **提交**: ${{ github.sha }}
            - **发布时间**: ${{ github.event.head_commit.timestamp }}
            
            ## 📥 下载
            - `${{ steps.version.outputs.apk_name }}-release.apk` - Release版本（推荐）
            - `${{ steps.version.outputs.apk_name }}-debug.apk` - Debug版本
            
            ## 🚀 安装
            ```bash
            adb install -r ${{ steps.version.outputs.apk_name }}-release.apk
            ```
            
            ## 📝 更新日志
            查看 [CHANGELOG.md](https://github.com/xbrooke/DBTOOL/blob/main/CHANGELOG.md) 了解详细更新内容
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
